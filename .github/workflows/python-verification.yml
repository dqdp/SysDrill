name: Repository Verification

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: Verify Python
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/pyproject.toml
            tools/system-design-space-importer/pyproject.toml

      - name: Bootstrap Python environment
        run: make bootstrap-python PYTHON=python

      - name: Run Python verification
        run: make verify-python

  smoke:
    name: Smoke Python
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/pyproject.toml
            tools/system-design-space-importer/pyproject.toml

      - name: Bootstrap Python environment
        run: make bootstrap-python PYTHON=python

      - name: Run bounded smoke verification
        run: make smoke-python

  verify-frontend:
    name: Verify Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Bootstrap frontend dependencies
        run: make bootstrap-frontend

      - name: Run frontend verification
        run: make verify-frontend
